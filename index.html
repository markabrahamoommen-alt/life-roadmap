<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Life Roadmap — Login</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f5f4f0;
    --card: #ffffff;
    --text: #1a1a18;
    --text-secondary: #6b6a65;
    --border: rgba(0,0,0,0.12);
    --blue: #185FA5;
    --blue-bg: #E6F1FB;
    --blue-text: #0C447C;
    --error-bg: #FCEBEB;
    --error-text: #791F1F;
    --radius: 12px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a; --card: #242421; --text: #f0ede8;
      --text-secondary: #9b9a96; --border: rgba(255,255,255,0.1);
      --blue: #378ADD; --blue-bg: #0c2d52; --blue-text: #85B7EB;
      --error-bg: #501313; --error-text: #F09595;
    }
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }
  .card {
    background: var(--card);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 2.5rem 2rem;
    width: 100%;
    max-width: 380px;
  }
  .logo {
    width: 40px; height: 40px;
    background: var(--blue-bg);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    margin-bottom: 1.5rem;
  }
  h1 { font-size: 20px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
  .subtitle { font-size: 13px; color: var(--text-secondary); margin-bottom: 2rem; }
  .field { margin-bottom: 1rem; }
  label { display: block; font-size: 12px; font-weight: 500; color: var(--text-secondary); margin-bottom: 5px; text-transform: uppercase; letter-spacing: .04em; }
  input {
    width: 100%; padding: 10px 12px;
    font-size: 14px; color: var(--text);
    background: var(--bg); border: 0.5px solid var(--border);
    border-radius: 8px; outline: none;
    transition: border-color .15s;
  }
  input:focus { border-color: var(--blue); }
  button {
    width: 100%; padding: 11px;
    font-size: 14px; font-weight: 500;
    background: var(--blue); color: #fff;
    border: none; border-radius: 8px;
    cursor: pointer; margin-top: .5rem;
    transition: opacity .15s;
  }
  button:hover { opacity: 0.88; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  .error {
    display: none;
    background: var(--error-bg); color: var(--error-text);
    font-size: 13px; padding: 10px 12px;
    border-radius: 8px; margin-top: 1rem;
  }
  .error.show { display: block; }
  .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin .6s linear infinite; vertical-align: middle; margin-right: 6px; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="card">
  <div class="logo">🗺️</div>
  <h1>Life Roadmap</h1>
  <p class="subtitle">Sign in to access your personal roadmap</p>

  <div class="field">
    <label for="username">Username</label>
    <input type="text" id="username" autocomplete="username" placeholder="Enter username" />
  </div>
  <div class="field">
    <label for="password">Password</label>
    <input type="password" id="password" autocomplete="current-password" placeholder="Enter password" />
  </div>
  <button id="btn" onclick="login()">Sign in</button>
  <div class="error" id="error"></div>
</div>

<script>
  // If already logged in, redirect
  const token = sessionStorage.getItem('roadmap_token');
  if (token) window.location.href = '/app.html';

  async function login() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const btn = document.getElementById('btn');
    const errorEl = document.getElementById('error');

    errorEl.classList.remove('show');

    if (!username || !password) {
      errorEl.textContent = 'Please enter both username and password.';
      errorEl.classList.add('show');
      return;
    }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Signing in…';

    try {
      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      const data = await res.json();

      if (!res.ok) {
        errorEl.textContent = data.error || 'Login failed.';
        errorEl.classList.add('show');
        btn.disabled = false;
        btn.textContent = 'Sign in';
        return;
      }

      sessionStorage.setItem('roadmap_token', data.token);
      window.location.href = '/app.html';

    } catch (err) {
      errorEl.textContent = 'Network error. Please try again.';
      errorEl.classList.add('show');
      btn.disabled = false;
      btn.textContent = 'Sign in';
    }
  }

  // Allow Enter key
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') login();
  });
</script>
</body>
</html>
